<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD+HTML Reader - 增强版</title>

  <!-- Highlight.js 代码高亮 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      line-height: 1.47;
      color: #1d1d1f;
      background: #f5f5f7;
    }

    .app-container {
      display: flex;
      height: 100vh;
    }

    /* 顶部工具栏 (Apple 全局导航风格) */
    .toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 44px;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }

    .toolbar-title {
      color: #ffffff;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: -0.12px;
    }

    .toolbar-actions button {
      background: #1d1d1f;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 8px 15px;
      font-size: 14px;
      cursor: pointer;
      margin-left: 8px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    }

    .toolbar-actions button:hover {
      background: #333333;
    }

    .toolbar-actions button:active {
      transform: scale(0.95);
    }

    .sidebar {
      width: 320px;
      background: #ffffff;
      border-right: 1px solid #e0e0e0;
      padding: 24px;
      overflow-y: auto;
      margin-top: 44px;
      height: calc(100vh - 44px);
    }

    .sidebar h2 {
      font-size: 21px;
      font-weight: 600;
      line-height: 1.19;
      letter-spacing: 0.231px;
      margin-bottom: 16px;
      color: #1d1d1f;
    }

    .sidebar button {
      width: 100%;
      background: #0066cc;
      color: #ffffff;
      border: none;
      border-radius: 9999px;
      padding: 11px 22px;
      font-size: 17px;
      font-weight: 400;
      letter-spacing: -0.374px;
      cursor: pointer;
      margin-bottom: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    }

    .sidebar button:hover {
      background: #0071e3;
    }

    .sidebar button:active {
      transform: scale(0.95);
    }

    .sidebar textarea {
      width: 100%;
      min-height: 300px;
      padding: 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', Consolas, monospace;
      font-size: 14px;
      line-height: 1.43;
      resize: vertical;
      margin-bottom: 12px;
    }

    .preview-area {
      flex: 1;
      background: #ffffff;
      overflow-y: auto;
      margin-top: 44px;
      height: calc(100vh - 44px);
    }

    .preview-content {
      max-width: 980px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .preview-content h1 {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      font-size: 40px;
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: 0;
      color: #1d1d1f;
      margin: 32px 0 16px;
    }

    .preview-content h2 {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      font-size: 28px;
      font-weight: 400;
      line-height: 1.14;
      letter-spacing: 0.196px;
      color: #1d1d1f;
      margin: 24px 0 12px;
    }

    .preview-content h3 {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      font-size: 21px;
      font-weight: 600;
      line-height: 1.19;
      letter-spacing: 0.231px;
      color: #1d1d1f;
      margin: 20px 0 8px;
    }

    .preview-content p {
      margin: 12px 0;
      font-size: 17px;
      line-height: 1.47;
      letter-spacing: -0.374px;
    }

    .preview-content code {
      background: #f5f5f7;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', Consolas, monospace;
      font-size: 14px;
    }

    .preview-content pre {
      background: #f5f5f7;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 16px 0;
    }

    .preview-content pre code {
      background: none;
      padding: 0;
    }

    .preview-content blockquote {
      border-left: 4px solid #0066cc;
      padding-left: 16px;
      margin: 16px 0;
      color: #7a7a7a;
      font-style: italic;
    }

    .preview-content ul, .preview-content ol {
      margin: 12px 0;
      padding-left: 32px;
    }

    .preview-content li {
      margin: 6px 0;
    }

    .preview-content strong {
      font-weight: 600;
    }

    .preview-content a {
      color: #0066cc;
      text-decoration: none;
    }

    .preview-content a:hover {
      text-decoration: underline;
    }

    /* Mermaid 图表容器 */
    .mermaid {
      background: #ffffff;
      padding: 24px;
      margin: 24px 0;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
    }

    .status-message {
      font-size: 14px;
      color: #7a7a7a;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <!-- 顶部工具栏 -->
  <div class="toolbar">
    <div class="toolbar-title">MD+HTML Reader</div>
    <div class="toolbar-actions">
      <button onclick="openFile()">打开文件</button>
      <button onclick="exportHTML()">导出 HTML</button>
    </div>
  </div>

  <div class="app-container">
    <!-- 左侧编辑区 -->
    <div class="sidebar">
      <h2>Markdown 编辑</h2>
      <textarea id="editor" placeholder="在此输入 Markdown..."></textarea>
      <button onclick="loadTestDoc()">加载测试文档</button>
      <button onclick="clearEditor()">清空</button>
      <div id="status" class="status-message"></div>
    </div>

    <!-- 右侧预览区 -->
    <div class="preview-area">
      <div id="preview" class="preview-content">
        <h1>欢迎使用 MD+HTML Reader</h1>
        <p>在左侧编辑 Markdown，右侧实时预览。</p>
        <h2>支持的功能</h2>
        <ul>
          <li><strong>代码高亮</strong> - 自动识别语言并高亮显示</li>
          <li><strong>Mermaid 图表</strong> - 流程图、时序图、甘特图</li>
          <li><strong>实时渲染</strong> - 输入即可查看效果</li>
          <li><strong>文件打开</strong> - 支持从本地打开 .md 文件</li>
        </ul>
      </div>
    </div>
  </div>

  <!-- 外部依赖：CDN -->
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>

  <script>
    // 初始化 Mermaid
    mermaid.initialize({
      startOnLoad: false,
      theme: 'default'
    });

    // 初始化 markdown-it 并配置代码高亮
    const md = window.markdownit({
      html: false,  // 禁用 HTML 标签（安全）
      linkify: true,
      typographer: true,
      highlight: function (str, lang) {
        if (lang && hljs.getLanguage(lang)) {
          try {
            return '<pre><code class="hljs">' +
                   hljs.highlight(str, { language: lang, ignoreIllegals: true }).value +
                   '</code></pre>';
          } catch (__) {}
        }
        return '<pre><code class="hljs">' + md.utils.escapeHtml(str) + '</code></pre>';
      }
    });

    let mermaidCounter = 0;

    async function renderMarkdown() {
      const source = document.getElementById('editor').value;

      // 先提取 Mermaid 代码块
      const mermaidBlocks = [];
      const sourceWithPlaceholders = source.replace(/```mermaid\n([\s\S]*?)```/g, (match, code) => {
        const id = `mermaid-${mermaidCounter++}`;
        mermaidBlocks.push({ id, code: code.trim() });
        return `<div id="${id}" class="mermaid-placeholder"></div>`;
      });

      // 渲染 Markdown
      const html = md.render(sourceWithPlaceholders);
      document.getElementById('preview').innerHTML = html;

      // 渲染 Mermaid 图表
      for (const block of mermaidBlocks) {
        const element = document.getElementById(block.id);
        if (element) {
          try {
            const { svg } = await mermaid.render(`mermaid-svg-${block.id}`, block.code);
            element.innerHTML = svg;
            element.classList.add('mermaid');
            element.classList.remove('mermaid-placeholder');
          } catch (err) {
            element.innerHTML = `<pre style="color: red;">Mermaid 渲染错误:\n${err.message}</pre>`;
          }
        }
      }
    }

    async function loadTestDoc() {
      try {
        const response = await fetch('test-doc.md');
        if (!response.ok) throw new Error('无法加载文件');
        const text = await response.text();
        document.getElementById('editor').value = text;
        await renderMarkdown();
        showStatus('✓ 已加载 test-doc.md');
      } catch (err) {
        showStatus('✗ 加载失败: ' + err.message);
      }
    }

    async function openFile() {
      if (!window.showOpenFilePicker) {
        alert('您的浏览器不支持 File System Access API。请使用 Chrome/Edge 最新版。');
        return;
      }

      try {
        const [fileHandle] = await window.showOpenFilePicker({
          types: [{
            description: 'Markdown 文件',
            accept: { 'text/markdown': ['.md', '.markdown'] }
          }],
          multiple: false
        });

        const file = await fileHandle.getFile();
        const text = await file.text();
        document.getElementById('editor').value = text;
        await renderMarkdown();
        showStatus(`✓ 已打开 ${file.name}`);
      } catch (err) {
        if (err.name !== 'AbortError') {
          showStatus('✗ 打开失败: ' + err.message);
        }
      }
    }

    function clearEditor() {
      document.getElementById('editor').value = '';
      document.getElementById('preview').innerHTML = '<h1>欢迎使用 MD+HTML Reader</h1><p>在左侧编辑 Markdown，右侧实时预览。</p>';
      showStatus('✓ 已清空');
    }

    function exportHTML() {
      const html = document.getElementById('preview').innerHTML;
      const fullHTML = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>导出的文档</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif; line-height: 1.47; color: #1d1d1f; max-width: 980px; margin: 48px auto; padding: 0 24px; }
    h1 { font-size: 40px; font-weight: 600; }
    h2 { font-size: 28px; font-weight: 400; }
    pre { background: #f5f5f7; padding: 16px; border-radius: 8px; overflow-x: auto; }
    code { font-family: 'SF Mono', Monaco, Consolas, monospace; }
    a { color: #0066cc; text-decoration: none; }
  </style>
</head>
<body>
${html}
</body>
</html>`;

      const blob = new Blob([fullHTML], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'export.html';
      a.click();
      URL.revokeObjectURL(url);
      showStatus('✓ HTML 已导出');
    }

    function showStatus(message) {
      const status = document.getElementById('status');
      status.textContent = message;
      setTimeout(() => { status.textContent = ''; }, 3000);
    }

    // 实时渲染（输入时自动更新，防抖 300ms）
    let renderTimeout;
    document.getElementById('editor').addEventListener('input', () => {
      clearTimeout(renderTimeout);
      renderTimeout = setTimeout(renderMarkdown, 300);
    });

    // 初始加载测试文档
    window.addEventListener('load', loadTestDoc);
  </script>
</body>
</html>
