<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD+HTML Reader - 增强版</title>

  <!-- Highlight.js 代码高亮 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      line-height: 1.47;
      color: #1d1d1f;
      background: #f5f5f7;
    }

    .app-container {
      display: flex;
      height: 100vh;
    }

    /* 顶部工具栏 (Apple 全局导航风格) */
    .toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 44px;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }

    .toolbar-title {
      color: #ffffff;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: -0.12px;
    }

    .toolbar-actions button {
      background: #1d1d1f;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 8px 15px;
      font-size: 14px;
      cursor: pointer;
      margin-left: 8px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    }

    .toolbar-actions button:hover {
      background: #333333;
    }

    .toolbar-actions button:active {
      transform: scale(0.95);
    }

    .sidebar {
      width: 320px;
      background: #ffffff;
      border-right: 1px solid #e0e0e0;
      padding: 24px;
      overflow-y: auto;
      margin-top: 44px;
      height: calc(100vh - 44px);
    }

    .sidebar h2 {
      font-size: 21px;
      font-weight: 600;
      line-height: 1.19;
      letter-spacing: 0.231px;
      margin-bottom: 16px;
      color: #1d1d1f;
    }

    .sidebar button {
      width: 100%;
      background: #0066cc;
      color: #ffffff;
      border: none;
      border-radius: 9999px;
      padding: 11px 22px;
      font-size: 17px;
      font-weight: 400;
      letter-spacing: -0.374px;
      cursor: pointer;
      margin-bottom: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    }

    .sidebar button:hover {
      background: #0071e3;
    }

    .sidebar button:active {
      transform: scale(0.95);
    }

    .sidebar textarea {
      width: 100%;
      min-height: 300px;
      padding: 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', Consolas, monospace;
      font-size: 14px;
      line-height: 1.43;
      resize: vertical;
      margin-bottom: 12px;
    }

    .preview-area {
      flex: 1;
      background: #ffffff;
      overflow-y: auto;
      margin-top: 44px;
      height: calc(100vh - 44px);
    }

    .preview-content {
      max-width: 980px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .preview-content h1 {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      font-size: 40px;
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: 0;
      color: #1d1d1f;
      margin: 32px 0 16px;
    }

    .preview-content h2 {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      font-size: 28px;
      font-weight: 400;
      line-height: 1.14;
      letter-spacing: 0.196px;
      color: #1d1d1f;
      margin: 24px 0 12px;
    }

    .preview-content h3 {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      font-size: 21px;
      font-weight: 600;
      line-height: 1.19;
      letter-spacing: 0.231px;
      color: #1d1d1f;
      margin: 20px 0 8px;
    }

    .preview-content p {
      margin: 12px 0;
      font-size: 17px;
      line-height: 1.47;
      letter-spacing: -0.374px;
    }

    .preview-content code {
      background: #f5f5f7;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', Consolas, monospace;
      font-size: 14px;
    }

    .preview-content pre {
      background: #f5f5f7;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 16px 0;
    }

    .preview-content pre code {
      background: none;
      padding: 0;
    }

    .preview-content blockquote {
      border-left: 4px solid #0066cc;
      padding-left: 16px;
      margin: 16px 0;
      color: #7a7a7a;
      font-style: italic;
    }

    .preview-content ul, .preview-content ol {
      margin: 12px 0;
      padding-left: 32px;
    }

    .preview-content li {
      margin: 6px 0;
    }

    .preview-content strong {
      font-weight: 600;
    }

    .preview-content a {
      color: #0066cc;
      text-decoration: none;
    }

    .preview-content a:hover {
      text-decoration: underline;
    }

    /* Mermaid 图表容器 */
    .mermaid {
      background: #ffffff;
      padding: 24px;
      margin: 24px 0;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
    }

    .status-message {
      font-size: 14px;
      color: #7a7a7a;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <!-- 顶部工具栏 -->
  <div class="toolbar">
    <div class="toolbar-title">MD+HTML Reader</div>
    <div class="toolbar-actions">
      <button onclick="openFile()">打开文件</button>
      <button onclick="exportHTML()">导出 HTML</button>
    </div>
  </div>

  <div class="app-container">
    <!-- 左侧编辑区 -->
    <div class="sidebar">
      <h2>Markdown 编辑</h2>
      <textarea id="editor" placeholder="在此输入 Markdown..."></textarea>
      <button onclick="loadTestDoc()">加载测试文档</button>
      <button onclick="clearEditor()">清空</button>
      <div id="status" class="status-message"></div>
    </div>

    <!-- 右侧预览区 -->
    <div class="preview-area">
      <div id="preview" class="preview-content">
        <h1>欢迎使用 MD+HTML Reader</h1>
        <p>在左侧编辑 Markdown，右侧实时预览。</p>
        <h2>支持的功能</h2>
        <ul>
          <li><strong>代码高亮</strong> - 自动识别语言并高亮显示</li>
          <li><strong>Mermaid 图表</strong> - 流程图、时序图、甘特图</li>
          <li><strong>实时渲染</strong> - 输入即可查看效果</li>
          <li><strong>文件打开</strong> - 支持从本地打开 .md 文件</li>
        </ul>
      </div>
    </div>
  </div>

  <!-- 外部依赖：CDN -->
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

  <!-- 翻译功能模块 -->
  <script src="translation-feature.js"></script>

  <script>
    // 初始化 Mermaid（配置安全级别防止 XSS）
    mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      securityLevel: 'strict'  // 启用严格安全模式
    });

    // 初始化 markdown-it 并配置代码高亮
    const md = window.markdownit({
      html: false,  // 禁用 HTML 标签（安全）
      linkify: true,
      typographer: true,
      highlight: function (str, lang) {
        // 使用 window.markdownit.utils 避免循环依赖（不依赖外部 md 变量）
        const escapeHtml = window.markdownit().utils.escapeHtml;

        // mermaid 块不高亮，保留原文 + language-mermaid 类，供渲染后替换
        if (lang === 'mermaid') {
          return '<pre><code class="language-mermaid">' + escapeHtml(str) + '</code></pre>';
        }
        if (lang && hljs.getLanguage(lang)) {
          try {
            // 转义 lang 参数防止属性注入
            const safeLang = escapeHtml(lang);
            return '<pre><code class="hljs language-' + safeLang + '">' +
                   hljs.highlight(str, { language: lang, ignoreIllegals: true }).value +
                   '</code></pre>';
          } catch (__) {}
        }
        return '<pre><code class="hljs">' + escapeHtml(str) + '</code></pre>';
      }
    });

    // 使用时间戳保证 ID 全局唯一，避免多次渲染时 ID 冲突
    let renderSessionId = Date.now();

    async function renderMarkdown() {
      const source = document.getElementById('editor').value;
      const sessionId = renderSessionId++;  // 每次渲染递增会话 ID

      // 渲染 Markdown（mermaid 代码块会先渲染成普通 <pre><code> 块）
      const html = md.render(source);
      const preview = document.getElementById('preview');
      preview.innerHTML = html;

      // 渲染后在 DOM 中查找 mermaid 代码块并替换为图表
      // 使用 Promise.allSettled 并行渲染所有图表，提升性能
      const codeBlocks = Array.from(preview.querySelectorAll('pre code.language-mermaid'));

      const renderTasks = codeBlocks.map(async (codeEl, index) => {
        const code = codeEl.textContent.trim();
        const id = `mermaid-${sessionId}-${index}`;  // 唯一 ID：会话ID + 索引
        const container = document.createElement('div');
        container.className = 'mermaid';

        try {
          const { svg } = await mermaid.render(id, code);
          // 使用 DOMPurify 清理 SVG 防止 XSS
          container.innerHTML = DOMPurify.sanitize(svg, {
            USE_PROFILES: { svg: true, svgFilters: true }
          });
        } catch (err) {
          // 转义错误消息防止 HTML 注入
          const escapeHtml = (text) => {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
          };
          container.innerHTML = `<pre style="color: red;">Mermaid 渲染错误:\n${escapeHtml(err.message)}</pre>`;
        }

        // 返回替换操作的信息
        return { codeEl, container };
      });

      // 等待所有图表并行渲染完成
      const results = await Promise.allSettled(renderTasks);

      // 按原始顺序替换 DOM 元素
      results.forEach((result) => {
        if (result.status === 'fulfilled') {
          const { codeEl, container } = result.value;
          const preEl = codeEl.closest('pre');
          if (preEl) {  // 防御性检查
            preEl.replaceWith(container);
          }
        }
      });
    }

    async function loadTestDoc() {
      try {
        const response = await fetch('test-doc.md');
        if (!response.ok) throw new Error('无法加载文件');
        const text = await response.text();
        document.getElementById('editor').value = text;
        await renderMarkdown();
        showStatus('✓ 已加载 test-doc.md');
      } catch (err) {
        showStatus('✗ 加载失败: ' + err.message);
      }
    }

    async function openFile() {
      if (!window.showOpenFilePicker) {
        alert('您的浏览器不支持 File System Access API。请使用 Chrome/Edge 最新版。');
        return;
      }

      try {
        const [fileHandle] = await window.showOpenFilePicker({
          types: [{
            description: 'Markdown 文件',
            accept: { 'text/markdown': ['.md', '.markdown'] }
          }],
          multiple: false
        });

        const file = await fileHandle.getFile();
        const text = await file.text();
        document.getElementById('editor').value = text;
        await renderMarkdown();
        showStatus(`✓ 已打开 ${file.name}`);
      } catch (err) {
        if (err.name !== 'AbortError') {
          showStatus('✗ 打开失败: ' + err.message);
        }
      }
    }

    function clearEditor() {
      document.getElementById('editor').value = '';
      document.getElementById('preview').innerHTML = '<h1>欢迎使用 MD+HTML Reader</h1><p>在左侧编辑 Markdown，右侧实时预览。</p>';
      showStatus('✓ 已清空');
    }

    function exportHTML() {
      const html = document.getElementById('preview').innerHTML;
      const fullHTML = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>导出的文档</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif; line-height: 1.47; color: #1d1d1f; max-width: 980px; margin: 48px auto; padding: 0 24px; }
    h1 { font-size: 40px; font-weight: 600; }
    h2 { font-size: 28px; font-weight: 400; }
    pre { background: #f5f5f7; padding: 16px; border-radius: 8px; overflow-x: auto; }
    code { font-family: 'SF Mono', Monaco, Consolas, monospace; }
    a { color: #0066cc; text-decoration: none; }
  </style>
</head>
<body>
${html}
</body>
</html>`;

      const blob = new Blob([fullHTML], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'export.html';
      a.click();
      URL.revokeObjectURL(url);
      showStatus('✓ HTML 已导出');
    }

    function showStatus(message) {
      const status = document.getElementById('status');
      status.textContent = message;
      setTimeout(() => { status.textContent = ''; }, 3000);
    }

    // 实时渲染（输入时自动更新，防抖 300ms）
    let renderTimeout;
    document.getElementById('editor').addEventListener('input', () => {
      clearTimeout(renderTimeout);
      renderTimeout = setTimeout(renderMarkdown, 300);
    });

    // 初始化翻译功能
    let translationFeature;
    window.addEventListener('load', () => {
      loadTestDoc();

      // 初始化翻译（使用 Chrome 内置 API，如果不支持会自动提示）
      translationFeature = initTranslation('#preview', {
        service: 'chrome-builtin'  // 或 'baidu' / 'ollama'
      });

      console.log('✓ 翻译功能已启用：选中预览区文本即可翻译');
    });
  </script>
</body>
</html>
