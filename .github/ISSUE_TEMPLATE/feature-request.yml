name: Feature request
description: Propose a focused improvement to MD+HTML Reader.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Please describe the user problem before proposing a solution. Do not include confidential documents or credentials.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Who has this problem, and when does it happen?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
      description: Describe the desired workflow or behavior, not only the implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: contribution
    attributes:
      label: Would you like to contribute a pull request?
      options:
        - I can contribute a pull request
        - I can help test or clarify the request
        - I am only proposing the idea
    validations:
      required: true
