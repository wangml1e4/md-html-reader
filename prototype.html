<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD+HTML Reader - 原型</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      line-height: 1.47;
      color: #1d1d1f;
      background: #f5f5f7;
    }

    .app-container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: #ffffff;
      border-right: 1px solid #e0e0e0;
      padding: 24px;
      overflow-y: auto;
    }

    .sidebar h2 {
      font-size: 21px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .sidebar button {
      width: 100%;
      background: #0066cc;
      color: #ffffff;
      border: none;
      border-radius: 9999px;
      padding: 11px 22px;
      font-size: 17px;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .sidebar button:hover {
      background: #0071e3;
    }

    .sidebar button:active {
      transform: scale(0.95);
    }

    .sidebar textarea {
      width: 100%;
      min-height: 200px;
      padding: 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-family: 'SF Mono', Monaco, Consolas, monospace;
      font-size: 14px;
      resize: vertical;
    }

    .preview-area {
      flex: 1;
      background: #ffffff;
      overflow-y: auto;
    }

    .preview-content {
      max-width: 980px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .preview-content h1 {
      font-size: 40px;
      font-weight: 600;
      line-height: 1.1;
      margin: 32px 0 16px;
    }

    .preview-content h2 {
      font-size: 28px;
      font-weight: 600;
      line-height: 1.14;
      margin: 24px 0 12px;
    }

    .preview-content h3 {
      font-size: 21px;
      font-weight: 600;
      margin: 20px 0 8px;
    }

    .preview-content p {
      margin: 12px 0;
      font-size: 17px;
      line-height: 1.47;
    }

    .preview-content code {
      background: #f5f5f7;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'SF Mono', Monaco, Consolas, monospace;
      font-size: 14px;
    }

    .preview-content pre {
      background: #f5f5f7;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 16px 0;
    }

    .preview-content pre code {
      background: none;
      padding: 0;
    }

    .preview-content blockquote {
      border-left: 4px solid #0066cc;
      padding-left: 16px;
      margin: 16px 0;
      color: #7a7a7a;
    }

    .preview-content ul, .preview-content ol {
      margin: 12px 0;
      padding-left: 32px;
    }

    .preview-content li {
      margin: 6px 0;
    }

    .preview-content strong {
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="sidebar">
      <h2>Markdown 编辑</h2>
      <textarea id="editor" placeholder="在此输入 Markdown..."></textarea>
      <button onclick="renderMarkdown()">渲染预览</button>
      <button onclick="loadTestDoc()">加载测试文档</button>
    </div>
    <div class="preview-area">
      <div id="preview" class="preview-content">
        <h1>欢迎使用 MD+HTML Reader</h1>
        <p>在左侧编辑 Markdown，点击"渲染预览"查看效果。</p>
      </div>
    </div>
  </div>

  <!-- 使用 CDN 加载 markdown-it -->
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
  <script>
    const md = window.markdownit({
      html: false,  // 禁用 HTML 标签（安全）
      linkify: true,
      typographer: true
    });

    function renderMarkdown() {
      const source = document.getElementById('editor').value;
      const html = md.render(source);
      document.getElementById('preview').innerHTML = html;
    }

    async function loadTestDoc() {
      try {
        const response = await fetch('test-doc.md');
        const text = await response.text();
        document.getElementById('editor').value = text;
        renderMarkdown();
      } catch (err) {
        alert('无法加载测试文档: ' + err.message);
      }
    }

    // 实时渲染（输入时自动更新）
    document.getElementById('editor').addEventListener('input', () => {
      renderMarkdown();
    });
  </script>
</body>
</html>
