<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Ollama 连接测试</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }
    .test-box {
      background: #f5f5f7;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
    }
    .result {
      background: white;
      padding: 15px;
      border-radius: 6px;
      margin-top: 10px;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .success { border-left: 4px solid #34c759; }
    .error { border-left: 4px solid #ff3b30; }
    button {
      background: #007aff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #0051d5; }
  </style>
</head>
<body>
  <h1>🔍 Ollama 连接诊断工具</h1>

  <div class="test-box">
    <h3>测试 1: 检查 Ollama API 版本</h3>
    <button onclick="testVersion()">测试版本接口</button>
    <div id="version-result" class="result"></div>
  </div>

  <div class="test-box">
    <h3>测试 2: 列出已安装模型</h3>
    <button onclick="testModels()">列出模型</button>
    <div id="models-result" class="result"></div>
  </div>

  <div class="test-box">
    <h3>测试 3: 翻译测试（使用 qwen3.5）</h3>
    <button onclick="testTranslate()">测试翻译</button>
    <div id="translate-result" class="result"></div>
  </div>

  <div class="test-box">
    <h3>测试 4: 尝试其他端口</h3>
    <button onclick="testAlternativePorts()">测试其他端口</button>
    <div id="ports-result" class="result"></div>
  </div>

  <script>
    async function testVersion() {
      const result = document.getElementById('version-result');
      result.textContent = '正在测试...';
      result.className = 'result';

      try {
        const response = await fetch('http://localhost:11434/api/version');
        const data = await response.json();
        result.textContent = '✅ 成功!\n' + JSON.stringify(data, null, 2);
        result.classList.add('success');
      } catch (error) {
        result.textContent = '❌ 失败:\n' + error.message;
        result.classList.add('error');
      }
    }

    async function testModels() {
      const result = document.getElementById('models-result');
      result.textContent = '正在测试...';
      result.className = 'result';

      try {
        const response = await fetch('http://localhost:11434/api/tags');
        const data = await response.json();
        result.textContent = '✅ 成功! 已安装模型:\n' + JSON.stringify(data, null, 2);
        result.classList.add('success');
      } catch (error) {
        result.textContent = '❌ 失败:\n' + error.message;
        result.classList.add('error');
      }
    }

    async function testTranslate() {
      const result = document.getElementById('translate-result');
      result.textContent = '正在翻译（可能需要 10-30 秒）...';
      result.className = 'result';

      try {
        const response = await fetch('http://localhost:11434/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'qwen3.5:2b',
            prompt: '将以下中文翻译成英文，只输出翻译结果：\n\nMarkdown 预览器',
            stream: false
          })
        });

        const data = await response.json();
        result.textContent = '✅ 翻译成功!\n\n原文: Markdown 预览器\n译文: ' + data.response;
        result.classList.add('success');
      } catch (error) {
        result.textContent = '❌ 失败:\n' + error.message + '\n\n可能原因:\n1. Ollama 服务未启动\n2. 模型未下载\n3. 端口配置错误';
        result.classList.add('error');
      }
    }

    async function testAlternativePorts() {
      const result = document.getElementById('ports-result');
      result.textContent = '正在测试多个端口...';
      result.className = 'result';

      const ports = [11434, 8080, 3000, 5000];
      let findings = '';

      for (const port of ports) {
        try {
          const response = await fetch(`http://localhost:${port}/api/version`, {
            signal: AbortSignal.timeout(2000)
          });
          findings += `✅ 端口 ${port}: 响应成功\n`;
        } catch (error) {
          findings += `❌ 端口 ${port}: ${error.message}\n`;
        }
      }

      result.textContent = findings;
    }
  </script>
</body>
</html>
